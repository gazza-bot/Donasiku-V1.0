<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Donasiku</title>
  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/globalakun.css">
  <link rel="icon" href="img/logo.png">

</head>

<body>
  <div class="container">

    <!-- LEFT SIDE -->
    <div class="left-side">
      <img src="img/logingambar.png" alt="">
      <div class="overlay"></div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">
      <div class="login-card">

        <!-- LOGO -->
        <div class="logo">
          <img src="img/logo.png" alt="Logo">
        </div>
        <h2 class="logo-text">
          <span class="bold">Donasi</span><span class="regular">ku</span>
        </h2>

        <!-- WELCOME -->
        <div class="welcome">
          <h1>Selamat Datang!</h1>
        </div>

        <!-- FORM -->
        <form id="loginForm">
          <div class="form-group">
            <label>Email atau Nomor HP</label>
            <div class="input-box">
              <input type="text" id="email" placeholder="Masukkan email atau nomor HP">
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-box">
              <input type="password" id="password" placeholder="Masukkan password">
              <span class="toggle-password" id="togglePassword">
                <i class="fa-regular fa-eye"></i>
              </span>
            </div>
          </div>

          <!-- EXTRA -->
          <div class="form-extra">
            <label class="remember">
              <input type="checkbox">
              Ingat saya
            </label>
            <a href="forgot.html" class="forgot">
              Lupa Password?
            </a>
          </div>

          <!-- BUTTON -->
          <button type="button" class="btn-login" onclick="window.location.href='dashboard.html'">
            Masuk
          </button>

          <!-- DIVIDER -->
          <div class="divider">
            atau masuk dengan
          </div>

          <!-- SOCIAL -->
          <div class="social-login">
            <div class="social-btn">
              <i class="fa-brands fa-google"></i>
            </div>
            <div class="social-btn">
              <i class="fa-brands fa-facebook-f"></i>
            </div>
            <div class="social-btn">
              <i class="fa-brands fa-apple"></i>
            </div>
          </div>

          <!-- SIGNUP -->
          <div class="signup">
            <span>Belum punya akun?</span>
            <a href="registerPage.html">Daftar sekarang</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="js/script.js"></script>
</body>

</html>
