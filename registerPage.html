<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Donasiku</title>
    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/registerStyle.css">
    <link rel="stylesheet" href="css/globalakun.css">
</head>
<body>
    <div class="container">
        <div class="left-side">
            <img src="img/logingambar.png" alt="">
            <div class="overlay"></div>
        </div>
        <div class="right-side">
            <div class="register-card">

                <!-- LOGO -->
                <div class="logo">
                    <img src="img/logo.png" alt="Logo">
                </div>
                <h2 class="logo-text">
                    <span class="bold">Donasi</span><span class="regular">ku</span>
                </h2>

                <!-- WELCOME -->
                <div class="register-text">
                    <h1>Daftar Akun</h1>
                </div>

                <!-- FORM -->
                <form id="registerForm">

                    <!-- EMAIL DAN NOMOR HP -->
                    <div class="form-group">
                        <label>Email atau Nomor HP</label>
                        <div class="input-box">
                            <input type="text" id="email" placeholder="Masukkan email atau nomor HP">
                        </div>
                    </div>

                    <!-- NAMA LENGKAP -->
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <div class="input-box">
                            <input type="text" id="namaLengkap" placeholder="Masukkan Nama Lengkap Anda">
                        </div>
                    </div>

                    <!-- PASSWORD -->
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-box">
                            <input type="password" id="password" placeholder="Masukkan password">
                            <span class="toggle-password" id="togglePassword">
                                <i class="fa-regular fa-eye-slash"></i>
                            </span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Konfirmasi Password</label>
                        <div class="input-box">
                            <input type="password" id="confirmed-password" placeholder="Ulangi password">
                            <span class="toggle-password" id="toggleConfirmedPw">
                                <i class="fa-regular fa-eye-slash"></i>
                            </span>
                        </div>
                    </div>

                    <!-- AGREEMENT -->
                    <div class="form-extra-register">
                        <label class="agreement">
                            <input id="checkboxAgreement" type="checkbox">
                            <span>Saya setuju dengan <a class="terms-condition" href="#">Syarat & Ketentuan</a></span>
                        </label>
                        <p class="agreeText">
                            Dengan menekan tombol “Daftar” di bawah ini, saya setuju
                            dengan <a class="terms-condition" href="#">Syarat dan Ketentuan</a>
                        </p>
                    </div>

                    <!-- BUTTON -->
                    <button type="submit" class="btn-login" onclick="window.location.href='index.html'">
                        Daftar
                    </button>

                    <!-- SIGN UP -->
                    <div class="signup">
                        <span>Sudah punya Akun?</span>
                        <a href="index.html">Masuk sekarang</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- JS -->
    <script src="js/script.js"></script>

</body>

</html>
